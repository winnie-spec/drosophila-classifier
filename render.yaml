services:
  - type: web
    name: flygenomics-ai
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers=1 --threads=1 --timeout=120 --max-requests=20 --max-requests-jitter=5
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: false
      - key: PYTHON_VERSION
        value: 3.11.9
